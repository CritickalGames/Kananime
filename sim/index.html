<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Playlist OK.ru</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
  <h1>🎥 Ver Naruto <span id="cap"></span></h1>

    <!-- Selector de modo -->
    <div class="mode-selector">
      <label>
        <input type="radio" name="mode" value="mixto" checked> Mixto
      </label>
      <label>
        <input type="radio" name="mode" value="sin"> Sin relleno
      </label>
      <label>
        <input type="radio" name="mode" value="con"> Con relleno
      </label>
    </div>

    <!-- Reproductor -->
    <div class="player">
      <iframe id="videoPlayer" width="640" height="360" frameborder="0"></iframe>
    </div>

    <!-- Controles -->
    <div class="controls">
      <button id="prevBtn" class="btn" disabled>◀ Anterior</button>
      <button id="nextBtn" class="btn">Siguiente ▶</button>
    </div>

    <!-- Lista con scroll interno -->
    <div class="playlist-container">
      <div class="playlist" id="videoList"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
